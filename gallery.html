    <main>
         <h1 id="welcome" style="text-align: center;">안녕하세요 환영합니다!</h1>
        <div id="login-box" style="text-align: center; margin: 50px; border: 1px solid ; border-radius: 30px; background-color: #6FA8DC; color: white;margin-top: 20px;
 "> <h2>시스템 인증이 필요합니다</h2>
 <input type="text" id="username" class="login" placeholder="사용자 이름"/><br>
 <input type="password" id="userPw" class="login" placeholder="암호 입력"/><br>
 <button class="login_button" onclick="checkLogin()">입장하기</button>
        </div>
        <div id="secret-area" style="display: none;">
<h3 style="color: red;"><span id="user-display"></span>님, 반갑습니다!</h3>
<div class="display-box">
    <img id="targetImg" src="./image/crop1.jpg"style="width: 100%; max-width:500px;"/>
    <p id="tagetDesc">4월 7일: 방울토마토 첫 수확!</p>
</div>

<div class="thumb-list">
    <img src="./image/crop1.jpg"onclick="show('./image/crop1.jpg','4월 7일:사과 첫 수확!')"/>
     <img src="./image/crop2.jpg"onclick="show('./image/crop2.jpg','4월 8일:맛나는 사과 따는중!')"/>
          <img src="./image/crop3.jpg"onclick="show('./image/crop3.jpg','맛나는 사과ㅏ!')"/>
<img src="./image/crop4.jpg" onclick="show('./image/crop4.jpg','사과 따는 중!')"/>
<img src="./image/crop5.jpg" onclick="show('./image/crop5.jpg','사과가 정말 맛있겠다!')"/>
<img src="./image/crop6.jpeg" onclick="show('./image/crop6.jpeg','잘 익은 사과 발견!')"/>
<img src="./image/crop7.jpg" onclick="show('./image/crop7.jpg','탐스럽게 열린 사과!')"/>
<img src="./image/crop8.jpg" onclick="show('./image/crop8.jpg','한입 베어 물고 싶다!')"/>
<img src="./image/crop9.jpg" onclick="show('./image/crop9.jpg','사과 향기가 나는 것 같아!')"/> 
<img src="./image/crop10.jpg" onclick="show('./image/crop10.jpg','오늘 수확 대성공!')"/>

                                   
</div>
<div id="settings" style="margin-top: 30px; padding: 20px; border: 1px solid #ddd; background-color: #fff;">
        <h4> 시스템 보안 설정</h4>
        <p style="font-size: 0.9em; color: #666;">보안을 위해 정기적으로 비밀번호를 변경해 주세요.</p>
        <input type="password" id="newPw" placeholder="새 비밀번호 입력"/>
        <button class="Login" onclick="changePassword()">비밀번호 변경</button>
        <button class="Login" onclick="logout()">로그아웃</button>

<script>
function show(imgPath, text){
    document.getElementById("targetImg").src=imgPath;
        document.getElementById("tagetDesc").innerText=text;

}
 function checkLogin(){
    let name = document.getElementById("username").value;
    let pw = document.getElementById("userPw").value;

    let currentPw = localStorage.getItem("userPassword") || "1234";

    if(pw === currentPw && name !== ""){
        localStorage.setItem("isLoggedIn", "true");
        localStorage.setItem("savedName", name);
        localStorage.setItem("userPassword", currentPw);

        alert(name + "님, 로그인 성공!");

        document.getElementById("login-box").style.display="none";
        document.getElementById("welcome").style.display="none";
        document.getElementById("secret-area").style.display="block";
        document.getElementById("user-display").innerText=name;

    } else {
        alert("이름 또는 비밀번호가 틀렸습니다.");
    }
}
   window.onload=function(){
    let isLoggeIn=localStorage.getItem("isLoggedIn");
    let svaedName=localStorage.getItem("savedName");

    if(isLoggeIn ==="true"){
        document.getElementById("login-box").style.display="none";
        document.getElementById("secret-area").style.display="block";
        document.getElementById("welcome").style.display="none";
        document.getElementById("user-display").innerText=svaedName;
    }
   }

   function changePassword(){
    let newPw=document.getElementById("newPw").value;
    if(newPw.length<4){ alert("암호는 4자리 이상이어야 합니다."); return;}
    localStorage.setItem("userPassword",newPw);
    alert("비밀번호가 변경되었습니다.");
   }
   function logout(){
    if(confirm("로그아웃 하시겟습니까?")){
        localStorage.removeItem("isLoggedIn");
        localStorage.removeItem("savedName");
        location.href="index.html";
    }
   }
</script>
